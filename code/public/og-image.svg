<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="85%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#7C3BED" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="15%" cy="85%" r="40%">
      <stop offset="0%" stop-color="#7C3BED" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#000000" opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#ffffff"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Logo icon -->
  <rect x="80" y="80" width="64" height="64" rx="16" fill="#7C3BED"/>
  <!-- Tree icon (simplified branch) -->
  <circle cx="112" cy="96" r="6" fill="rgba(255,255,255,0.4)"/>
  <line x1="112" y1="102" x2="112" y2="118" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="112" y1="110" x2="96" y2="122" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="112" y1="110" x2="128" y2="122" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="96" cy="125" r="4.5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="128" cy="125" r="4.5" fill="rgba(255,255,255,0.5)"/>
  <line x1="96" y1="129" x2="88" y2="138" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="96" y1="129" x2="104" y2="138" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="128" y1="129" x2="120" y2="138" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="128" y1="129" x2="136" y2="138" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="160" y="124" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="600" fill="#1a0a2e" letter-spacing="-0.5">VocaBranch</text>

  <!-- Eyebrow pill -->
  <rect x="80" y="215" width="280" height="36" rx="18" fill="#7C3BED" opacity="0.1"/>
  <circle cx="104" cy="233" r="5" fill="#7C3BED"/>
  <text x="118" y="238" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="500" fill="#7C3BED">For ambitious English learners</text>

  <!-- Headline -->
  <text x="80" y="320" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="600" fill="#1a0a2e" letter-spacing="-1.5">Master vocabulary</text>
  <text x="80" y="396" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="600" fill="#1a0a2e" letter-spacing="-1.5">at the level you</text>
  <text x="80" y="472" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="600" fill="#7C3BED" letter-spacing="-1.5">actually need</text>

  <!-- Subline -->
  <text x="80" y="544" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" fill="#6b6b6b" letter-spacing="-0.3">AI word trees · Active practice · Real-world context · Mastery tracking</text>

  <!-- URL pill -->
  <rect x="80" y="574" width="200" height="34" rx="8" fill="#f5f3ff"/>
  <text x="100" y="596" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="500" fill="#7C3BED">vocabranch.com</text>
</svg>
